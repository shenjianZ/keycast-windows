# Website Configuration
site:
  title: "Keycast Windows Documentation"
  description: "Official documentation for Keycast Windows - A desktop keystroke overlay tool for Windows providing clear key feedback for recording, streaming, demos, and teaching"
  logo:
    light: "/images/favicon.svg"
    dark: "/images/favicon-dark.svg"
  author: "Keycast Team"

# Navigation Bar Configuration
navbar:
  showLogo: true
  showTitle: true
  showLanguageSwitcher: true
  items:
    - title: "Home"
      link: "/"
      active: true
    - title: "Docs"
      link: "/docs"
  actions:
    - type: "github"
      link: "https://github.com/shenjianZ/keycast-windows"
      enabled: true

# Sidebar Navigation Configuration
sidebar:
  enabled: true
  collections:
    docs:
      sections:
        # Getting Started Section
        - title: "Getting Started"
          path: "/docs/getting-started"
          children:
            - title: "Installation"
              path: "/docs/getting-started/installation"
            - title: "Basic Usage"
              path: "/docs/getting-started/basic-usage"
            - title: "Configuration Basics"
              path: "/docs/getting-started/configuration"

        # User Guide Section
        - title: "User Guide"
          path: "/docs/user-guide"
          children:
            - title: "Overview"
              path: "/docs/user-guide/overview"
            - title: "Display Modes"
              path: "/docs/user-guide/display-modes"
            - title: "Themes"
              path: "/docs/user-guide/themes"
            - title: "Position Settings"
              path: "/docs/user-guide/position"
            - title: "Shortcuts"
              path: "/docs/user-guide/shortcuts"
            - title: "System Settings"
              path: "/docs/user-guide/system-settings"
            - title: "Updates"
              path: "/docs/user-guide/updates"

        # Advanced Features Section
        - title: "Advanced"
          path: "/docs/advanced"
          children:
            - title: "Display Modes Explained"
              path: "/docs/advanced/display-modes"

        # Development Guide Section
        - title: "Development"
          path: "/docs/development"
          children:
            - title: "Introduction"
              path: "/docs/development/introduction"
            - title: "Tech Stack"
              path: "/docs/development/tech-stack"
            - title: "Project Structure"
              path: "/docs/development/project-structure"
            - title: "Development Environment"
              path: "/docs/development/development-environment"
            - title: "Local Development"
              path: "/docs/development/local-development"
            - title: "Building"
              path: "/docs/development/building"
            - title: "Contributing"
              path: "/docs/development/contributing"

# Theme Configuration
theme:
  defaultMode: "auto"
  allowToggle: true

# Table of Contents Configuration
toc:
  maxLevel: 4
  enabled: true
  title: "On This Page"

# Image Viewer Configuration
imageViewer:
  enabled: true
  labels:
    preview: "Preview Image"
    zoomIn: "Zoom In"
    zoomOut: "Zoom Out"
    fit: "Fit to Window"
    actualSize: "Actual Size"
    reset: "Reset"
    rotateLeft: "Rotate Left"
    rotateRight: "Rotate Right"
    fullscreen: "Fullscreen"
    download: "Download"
    openInNewTab: "Open in New Tab"
    close: "Close Image Viewer"

# Footer Configuration
footer:
  enabled: true
  copyright: "© 2026 Keycast Windows. All rights reserved."
  repository:
    url: "https://github.com/shenjianZ/keycast-windows"
    branch: "master"
  lastUpdated: "2026-03-23"
  version: "v0.1.6"
  groups:
    - title: "Community"
      items:
        - title: "GitHub Discussions"
          link: "https://github.com/shenjianZ/keycast-windows/discussions"
          external: true
        - title: "Issue Tracker"
          link: "https://github.com/shenjianZ/keycast-windows/issues"
          external: true
        - title: "Release Notes"
          link: "https://github.com/shenjianZ/keycast-windows/releases"
          external: true
    - title: "Related Links"
      items:
        - title: "Getting Started"
          link: "/docs/getting-started/installation"
        - title: "Source Code"
          link: "https://github.com/shenjianZ/keycast-windows"
          external: true
        - title: "License"
          link: "https://github.com/shenjianZ/keycast-windows/blob/master/LICENSE"
          external: true
  social:
    - name: "email"
      url: "mailto:15202078626@163.com"
      icon: "mail"
    - name: "github"
      url: "https://github.com/shenjianZ/keycast-windows"
      icon: "github"

# PWA Configuration
pwa:
  enabled: true
  name: "Keycast Windows"
  shortName: "Keycast"
  description: "Desktop keystroke overlay tool for Windows"
  themeColor: "#ffffff"
  backgroundColor: "#ffffff"

# Context Menu Configuration
contextMenu:
  enabled: true
  page:
    copySelectedText: true
    copyUrl: true
    copyTitle: false
    copyMarkdownLink: false
    openInNewTab: false
    reload: true
    printPage: true
    scrollToTop: true
    scrollToBottom: true
  site:
    goHome: true
    quickNav: false
    language: false
  appearance:
    theme: false
    resetThemePref: false

# MDX Component Configuration
mdx:
  componentsPath: "/src/components"
  enabled: true

ai:
  enabled: false

# Font Configuration
fonts:
  fontFamilyZhCn: "MiSans, PingFang SC, Noto Sans SC, Microsoft YaHei, sans-serif"
  fontFamilyEn: "Fragment Mono, system-ui, sans-serif"
  downloadFonts:
    - "FragmentMono-Italic.woff2"
    - "FragmentMono-Regular.woff2"
    - "MiSans-Bold.woff2"
    - "MiSans-Medium.woff2"
    - "MiSans-Regular.woff2"

# Code Highlight Configuration
codeHighlight:
  langs:
    - "bash"
    - "powershell"
  lightTheme: "github-light"
  darkTheme: "github-dark"

# Full-text Search Configuration
search:
  enabled: true
  placeholder: "Search docs..."
  maxResults: 20
  snippetLength: 120

export:
  enabled: true
  markdown: true
  pdf: true
  word: true
  allDocs: true
  pdfServer:
    enabled: false
    url: "http://localhost:3001"
