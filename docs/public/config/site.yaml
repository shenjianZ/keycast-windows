# 网站基本配置
site:
  title: "Keycast Windows 文档"
  description: "Windows 桌面按键屏显工具官方文档 - 为录屏、直播、演示和教学提供清晰的按键反馈"
  logo:
    light: "/images/favicon.svg"
    dark: "/images/favicon-dark.svg"
  author: "Keycast Team"

# 顶部导航配置
navbar:
  showLogo: true
  showTitle: true
  showLanguageSwitcher: true
  items:
    - title: "首页"
      link: "/"
      active: true
    - title: "文档"
      link: "/docs"
  actions:
    - type: "github"
      link: "https://github.com/shenjianZ/keycast-windows"
      enabled: true

# 侧边栏导航配置
sidebar:
  enabled: true
  collections:
    docs:
      sections:
        # 快速开始部分
        - title: "快速开始"
          path: "/docs/getting-started"
          children:
            - title: "下载安装"
              path: "/docs/getting-started/installation"
            - title: "基础使用"
              path: "/docs/getting-started/basic-usage"
            - title: "配置入门"
              path: "/docs/getting-started/configuration"

        # 用户指南部分
        - title: "用户指南"
          path: "/docs/user-guide"
          children:
            - title: "功能概览"
              path: "/docs/user-guide/overview"
            - title: "显示模式"
              path: "/docs/user-guide/display-modes"
            - title: "主题配置"
              path: "/docs/user-guide/themes"
            - title: "位置调整"
              path: "/docs/user-guide/position"
            - title: "快捷键设置"
              path: "/docs/user-guide/shortcuts"
            - title: "系统设置"
              path: "/docs/user-guide/system-settings"
            - title: "更新管理"
              path: "/docs/user-guide/updates"

        # 高级功能部分
        - title: "高级功能"
          path: "/docs/advanced"
          children:
            - title: "显示模式详解"
              path: "/docs/advanced/display-modes"

        # 开发指南部分
        - title: "开发指南"
          path: "/docs/development"
          children:
            - title: "项目介绍"
              path: "/docs/development/introduction"
            - title: "技术栈"
              path: "/docs/development/tech-stack"
            - title: "项目结构"
              path: "/docs/development/project-structure"
            - title: "开发环境"
              path: "/docs/development/development-environment"
            - title: "本地运行"
              path: "/docs/development/local-development"
            - title: "构建打包"
              path: "/docs/development/building"
            - title: "贡献指南"
              path: "/docs/development/contributing"

# Theme Configuration
theme:
  defaultMode: "auto"
  allowToggle: true

# Table of Contents Configuration
toc:
  maxLevel: 4
  enabled: true
  title: "本页目录"

# 图片查看器配置
imageViewer:
  enabled: true
  labels:
    preview: "预览图片"
    zoomIn: "放大"
    zoomOut: "缩小"
    fit: "适配窗口"
    actualSize: "原始比例"
    reset: "重置"
    rotateLeft: "左旋"
    rotateRight: "右旋"
    fullscreen: "全屏"
    download: "下载"
    openInNewTab: "新标签打开"
    close: "关闭图片查看器"

# Footer Configuration
footer:
  enabled: true
  copyright: "© 2026 Keycast Windows. All rights reserved."
  repository:
    url: "https://github.com/shenjianZ/keycast-windows"
    branch: "master"
  lastUpdated: "2026-03-23"
  version: "v0.1.5"
  groups:
    - title: "社区"
      items:
        - title: "GitHub Discussions"
          link: "https://github.com/shenjianZ/keycast-windows/discussions"
          external: true
        - title: "问题反馈"
          link: "https://github.com/shenjianZ/keycast-windows/issues"
          external: true
        - title: "更新日志"
          link: "https://github.com/shenjianZ/keycast-windows/releases"
          external: true
    - title: "相关链接"
      items:
        - title: "快速开始"
          link: "/docs/getting-started/installation"
        - title: "源代码"
          link: "https://github.com/shenjianZ/keycast-windows"
          external: true
        - title: "开源许可"
          link: "https://github.com/shenjianZ/keycast-windows/blob/master/LICENSE"
          external: true
  social:
    - name: "email"
      url: "mailto:15202078626@163.com"
      icon: "mail"
    - name: "github"
      url: "https://github.com/shenjianZ/keycast-windows"
      icon: "github"

# PWA Configuration
pwa:
  enabled: true
  name: "Keycast Windows"
  shortName: "Keycast"
  description: "Windows 桌面按键屏显工具"
  themeColor: "#ffffff"
  backgroundColor: "#ffffff"

# 右键菜单配置
contextMenu:
  enabled: true
  page:
    copySelectedText: true
    copyUrl: true
    copyTitle: false
    copyMarkdownLink: false
    openInNewTab: false
    reload: true
    printPage: true
    scrollToTop: true
    scrollToBottom: true
  site:
    goHome: true
    quickNav: false
    language: false
  appearance:
    theme: false
    resetThemePref: false

# MDX 组件配置
mdx:
  componentsPath: "/src/components"
  enabled: true

ai:
  enabled: false

# 字体配置
fonts:
  fontFamilyZhCn: "MiSans, PingFang SC, Noto Sans SC, Microsoft YaHei, sans-serif"
  fontFamilyEn: "Fragment Mono, system-ui, sans-serif"
  downloadFonts:
    - "FragmentMono-Italic.woff2"
    - "FragmentMono-Regular.woff2"
    - "MiSans-Bold.woff2"
    - "MiSans-Medium.woff2"
    - "MiSans-Regular.woff2"

# 代码高亮配置
codeHighlight:
  langs:
    - "bash"
    - "powershell"
  lightTheme: "github-light"
  darkTheme: "github-dark"

# 全文搜索配置
search:
  enabled: true
  placeholder: "搜索文档..."
  maxResults: 20
  snippetLength: 120

export:
  enabled: true
  markdown: true
  pdf: true
  word: true
  allDocs: true
  pdfServer:
    enabled: false
    url: "http://localhost:3001"
